<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOL — Blink 전환 데모</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #1a1a1a; color: #ccc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── 헤더 ── */
header { background: #111; border-bottom: 1px solid #333; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
header h1 { font-size: 13px; color: #fff; }
.header-btns { display: flex; gap: 8px; }
button { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: Arial, sans-serif; }
.btn-export { background: #d4af37; color: #111; font-weight: bold; }
.btn-reset  { background: #333; color: #aaa; }
.btn-menu-toggle { background: #2a2a2a; color: #ccc; min-width: 44px; min-height: 44px; font-size: 13px; }
button:hover { opacity: 0.85; }

.main { display: flex; flex: 1; overflow: hidden; }

/* ── 씬 목록 ── */
.scene-list { width: 188px; flex-shrink: 0; background: #161616; border-right: 1px solid #2a2a2a; overflow-y: auto; padding: 6px 0; }
.section-head { padding: 8px 12px 3px; font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
.scene-item { padding: 6px 12px; cursor: pointer; font-size: 11px; color: #777; border-left: 3px solid transparent; display: flex; align-items: center; justify-content: space-between; }
.scene-item:hover { background: #1e1e1e; color: #bbb; }
.scene-item.selected { background: #1e1e1e; color: #fff; border-left-color: #d4af37; }
.scene-item.loaded   { border-left-color: #2a6496; color: #7aadce; }
.scene-item.selected.loaded { border-left-color: #d4af37; color: #fff; }
.scene-item .code { font-size: 9px; color: #3a3a3a; flex-shrink: 0; margin-left: 4px; }

/* ── 설정 패널 ── */
.settings-panel { width: 290px; flex-shrink: 0; padding: 14px 14px; overflow-y: auto; border-right: 1px solid #2a2a2a; }
.settings-panel h2 { font-size: 13px; color: #fff; margin-bottom: 2px; }
.scene-sub { font-size: 10px; color: #444; margin-bottom: 12px; }

.ctrl-group { margin-bottom: 14px; }
.ctrl-label { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; padding-bottom: 4px; border-bottom: 1px solid #222; }

/* 타입 그리드 */
.type-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
.type-opt { position: relative; }
.type-opt input[type=radio] { position: absolute; opacity: 0; width: 0; height: 0; }
.type-opt label { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 7px 2px; border: 1px solid #252525; border-radius: 4px; cursor: pointer; font-size: 9px; color: #555; text-align: center; background: #1a1a1a; }
.type-opt input:checked + label { border-color: #d4af37; color: #d4af37; background: #1e1a0a; }
.type-opt label:hover { border-color: #444; color: #999; }
.type-icon { font-size: 14px; line-height: 1; }

/* 눈꺼풀 색 */
.color-row { display: flex; gap: 6px; align-items: center; }
.color-opt { position: relative; }
.color-opt input[type=radio] { position: absolute; opacity: 0; width: 0; height: 0; }
.color-opt label { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border: 1px solid #252525; border-radius: 4px; cursor: pointer; font-size: 10px; color: #555; background: #1a1a1a; }
.color-opt input:checked + label { border-color: #d4af37; color: #d4af37; background: #1e1a0a; }
.color-opt label:hover { border-color: #444; color: #999; }
.color-swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid #444; flex-shrink: 0; }
.color-custom-wrap { display: flex; align-items: center; gap: 6px; margin-top: 6px; opacity: 0.3; pointer-events: none; transition: opacity 150ms; }
.color-custom-wrap.active { opacity: 1; pointer-events: auto; }
.color-custom-wrap label { font-size: 10px; color: #555; }
input[type=color] { width: 32px; height: 22px; border: 1px solid #333; border-radius: 3px; background: #1a1a1a; cursor: pointer; padding: 1px; }

/* 플랫폼 탭 */
.platform-tabs { display: flex; gap: 0; margin-bottom: 12px; }
.ptab { flex: 1; padding: 6px 0; text-align: center; font-size: 11px; color: #555; background: #1a1a1a; border: 1px solid #252525; cursor: pointer; transition: all 150ms; }
.ptab:first-child { border-radius: 4px 0 0 4px; }
.ptab:last-child  { border-radius: 0 4px 4px 0; border-left: none; }
.ptab.active { background: #1e1a0a; color: #d4af37; border-color: #d4af37; }
.ptab:hover:not(.active) { color: #999; background: #1e1e1e; }

/* 슬라이더 */
.slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.s-label { font-size: 10px; color: #555; width: 60px; flex-shrink: 0; }
input[type=range] { -webkit-appearance: none; appearance: none; flex: 1; height: 3px; border-radius: 2px; background: #2a2a2a; outline: none; cursor: pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #d4af37; cursor: pointer; }
.s-val { font-size: 10px; color: #888; width: 42px; text-align: right; flex-shrink: 0; }

/* 이징 그리드 */
.ease-section { margin-bottom: 10px; }
.ease-section-label { font-size: 9px; color: #444; margin-bottom: 5px; }
.ease-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
.ease-opt { position: relative; }
.ease-opt input[type=radio] { position: absolute; opacity: 0; width: 0; height: 0; }
.ease-opt label { display: block; text-align: center; padding: 5px 2px; border: 1px solid #252525; border-radius: 3px; cursor: pointer; font-size: 9px; color: #555; background: #1a1a1a; }
.ease-opt input:checked + label { border-color: #d4af37; color: #d4af37; background: #1e1a0a; }
.ease-opt label:hover { border-color: #444; color: #999; }

/* 액션 버튼 */
.btn-play { width: 100%; margin-top: 14px; padding: 8px; background: #2a6496; color: #fff; font-weight: bold; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; }
.btn-play:hover { opacity: 0.85; }
.btn-play:disabled { opacity: 0.35; cursor: default; }
.btn-reload { width: 100%; margin-top: 5px; padding: 6px; background: #2a2a2a; color: #888; font-size: 11px; border: none; border-radius: 4px; cursor: pointer; }
.btn-reload:hover { opacity: 0.85; }
.hint { font-size: 10px; color: #333; margin-top: 12px; line-height: 1.7; }
.hint strong { color: #555; }

/* ── 미리보기 ── */
.preview-pane { flex: 1; min-width: 0; background: #0d0d0d; display: flex; flex-direction: column; }
.preview-header { padding: 8px 14px; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; font-size: 11px; color: #444; display: flex; align-items: center; justify-content: space-between; }
.preview-header .arrow { color: #d4af37; }
.preview-platform-btns { display: flex; gap: 4px; align-items: center; }
.ppbtn { padding: 3px 10px; font-size: 10px; background: #1a1a1a; border: 1px solid #252525; color: #555; border-radius: 3px; cursor: pointer; }
.ppbtn.active { background: #1e1a0a; color: #d4af37; border-color: #d4af37; }
.ppbtn:hover:not(.active) { color: #999; }
.btn-play-header { padding: 4px 12px; font-size: 11px; background: #2a6496; border: none; color: #fff; border-radius: 3px; cursor: pointer; font-weight: bold; white-space: nowrap; min-height: 28px; }
.btn-play-header:hover { opacity: 0.85; }

.preview-iframe-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; overflow: hidden; }
.iframe-stage { position: relative; height: 100%; width: auto; aspect-ratio: 1/1; max-height: calc(100vh - 74px); max-width: 100%; border: 1px solid #2a2a2a; border-radius: 2px; overflow: hidden; background: #000; display: none; }
iframe { display: block; width: 100%; height: 100%; border: none; background: #000; }

.lid { position: absolute; left: 0; right: 0; z-index: 20; pointer-events: none; }
.lid-top { top: 0;    transform: translateY(-100%); }
.lid-bot { bottom: 0; transform: translateY(100%);  }

.empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #333; font-size: 12px; flex-direction: column; gap: 8px; }
.empty-state .sub { font-size: 10px; color: #2a2a2a; }

/* ── 모달 ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.on { display: flex; }
.modal { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 20px; width: 500px; max-height: 80vh; display: flex; flex-direction: column; }
.modal h3 { font-size: 13px; color: #fff; margin-bottom: 3px; }
.modal p { font-size: 10px; color: #555; margin-bottom: 12px; }
textarea { flex: 1; background: #111; border: 1px solid #2a2a2a; color: #9cdcfe; padding: 10px; border-radius: 3px; font-size: 11px; font-family: monospace; resize: none; min-height: 220px; }
.modal-btns { display: flex; gap: 8px; margin-top: 10px; }
.btn-copy { background: #d4af37; color: #111; font-weight: bold; }
.btn-close-modal { background: #2a2a2a; color: #aaa; }
</style>
</head>
<body>

<header>
  <h1>MOL — Blink 전환 데모</h1>
  <div class="header-btns">
    <button class="btn-menu-toggle" onclick="toggleSceneList()">☰ 메뉴</button>
    <button class="btn-reset" onclick="resetAll()">초기화</button>
    <button class="btn-export" onclick="openExport()">JSON 내보내기</button>
  </div>
</header>

<div class="main">
  <!-- 씬 목록 -->
  <div class="scene-list" id="sceneList"></div>

  <!-- 설정 패널 -->
  <div class="settings-panel" id="settingsPanel">
    <div style="color:#333;font-size:11px;margin-top:40px;text-align:center;">씬을 선택하세요</div>
  </div>

  <!-- 미리보기 -->
  <div class="preview-pane">
    <div class="preview-header">
      <span id="previewLabel">미리보기</span>
      <div class="preview-platform-btns">
        <button class="btn-play-header" onclick="playBlink()">▶ 미리보기</button>
        <button class="ppbtn active" id="ppDesk" onclick="setPreviewPlatform('desktop')">🖥 Desktop</button>
        <button class="ppbtn" id="ppMob"  onclick="setPreviewPlatform('mobile')">📱 Mobile</button>
      </div>
    </div>
    <div class="preview-iframe-wrap">
      <div class="iframe-stage" id="iframeStage">
        <iframe id="previewFrame" title="씬 미리보기"></iframe>
        <div class="lid lid-top" id="lidTop"></div>
        <div class="lid lid-bot" id="lidBot"></div>
      </div>
      <div class="empty-state" id="emptyState">
        <div>← 씬을 클릭하면 미리보기가 시작됩니다</div>
        <div class="sub">씬 선택 후 ▶ 버튼으로 전환 재생</div>
      </div>
    </div>
  </div>
</div>

<!-- JSON 내보내기 모달 -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h3>JSON 내보내기</h3>
    <p>각 씬 HTML의 THIS_SCENE 또는 gallery.js SCENES_ALL에 추가하세요.</p>
    <textarea id="exportText" readonly></textarea>
    <div class="modal-btns">
      <button class="btn-copy" onclick="copyExport()">클립보드 복사</button>
      <button class="btn-close-modal" onclick="closeExport()">닫기</button>
    </div>
  </div>
</div>

<script>
/* ── 씬 데이터 ── */
var SCENES = [
  {section:'LPL',id:'LPL_01',code:'LPL#01',kr:'안개가 휘감은 세상에'},
  {section:'LPL',id:'LPL_02',code:'LPL#02',kr:'당신의 온기가 스며들면'},
  {section:'LPL',id:'LPL_03',code:'LPL#03',kr:'세상은 본연의 모습을'},
  {section:'LPL',id:'LPL_04',code:'LPL#04',kr:'그 품안에서 꿈이 일렁'},
  {section:'LDR',id:'LDR_00',code:'LDR#00',kr:'사랑의 꿈은'},
  {section:'LDR',id:'LDR_11',code:'LDR#11',kr:'이끌림을 따라'},
  {section:'LDR',id:'LDR_21',code:'LDR#21',kr:'설렘에 실려'},
  {section:'LDR',id:'LDR_31',code:'LDR#31',kr:'그리움과 함께 넓어지며'},
  {section:'LDR',id:'LDR_41',code:'LDR#41',kr:'애틋함으로 깊어져'},
  {section:'LDR',id:'LDR_51',code:'LDR#51',kr:'행복의 바다에 이르고'},
  {section:'LSN',id:'LSN_01',code:'LSN#01',kr:'사랑의 노래가 되어'},
  {section:'LSN',id:'LSN_02',code:'LSN#02',kr:'당신만을 바라봅니다'},
  {section:'LSN',id:'LSN_03',code:'LSN#03',kr:'어제, 오늘 그리고 내일'},
  {section:'LSN',id:'LSN_04',code:'LSN#04',kr:'하루의 모든 순간'},
  {section:'LSN',id:'LSN_05',code:'LSN#05',kr:'잠 못 이루는 밤'},
  {section:'LSN',id:'LSN_06',code:'LSN#06',kr:'꿈속에서도'},
  {section:'LSN',id:'LSN_07',code:'LSN#07',kr:'내가 머물고 싶은 공간'},
  {section:'LSN',id:'LSN_08',code:'LSN#08',kr:'끝없이 샘솟는 기쁨'},
  {section:'LSN',id:'LSN_09',code:'LSN#09',kr:'마음을 울리는 노래'},
  {section:'LSN',id:'LSN_10',code:'LSN#10',kr:'언제나 당신이 있습니다'},
  {section:'LSN',id:'LSN_11',code:'LSN#11',kr:'당신의'},
  {section:'LSN',id:'LSN_12',code:'LSN#12',kr:'해맑은 미소와 따스한 온기에'},
  {section:'LSN',id:'LSN_13',code:'LSN#13',kr:'모든 순간이 낙원이 되고'},
  {section:'LSN',id:'LSN_14',code:'LSN#14',kr:'온 세상이 사랑으로 물들면'},
  {section:'LSN',id:'LSN_15',code:'LSN#15',kr:'나는 당신의 사랑안에서'},
  {section:'LSN',id:'LSN_16',code:'LSN#16',kr:'새로이 태어납니다'},
];

var LID_TYPES = [
  {value:'linear',     icon:'━━', label:'직선'},
  {value:'convex',     icon:'◠◡', label:'볼록'},
  {value:'concave',    icon:'◡◠', label:'오목'},
  {value:'asymmetric', icon:'◠—', label:'비대칭'},
];
var EASE_TYPES = [
  {value:'linear',   label:'linear'},
  {value:'ease-in',  label:'ease-in'},
  {value:'ease-out', label:'ease-out'},
  {value:'bounce',   label:'bounce'},
];
var EASE_CSS = {
  'linear':   'linear',
  'ease-in':  'cubic-bezier(0.4,0,1,1)',
  'ease-out': 'cubic-bezier(0,0,0.2,1)',
  'bounce':   'cubic-bezier(0.34,1.56,0.64,1)',
};

/* 기본값 */
var DEFAULT_COMMON = { type:'linear', colorMode:'black', customColor:'#000000', curvature:50 };
var DEFAULT_PLATFORM = { closeMs:350, openMs:600, holdMs:0, closeEase:'ease-in', openEase:'ease-out', gradArea:0, gradStrength:100 };

/* 상태 */
var config = {};
var currentId = null;
var loadedId  = null;
var isPlaying = false;
var iframeReady = false;
var currentPlatform = 'desktop';
var currentPanelPlatform = 'desktop';

/* ── localStorage ── */
function saveConfig() { try { localStorage.setItem('mol_blink_cfg2', JSON.stringify(config)); } catch(e){} }
function loadConfig()  { try { var s=localStorage.getItem('mol_blink_cfg2'); if(s) config=JSON.parse(s); } catch(e){} }
function resetAll() { if(!confirm('설정을 초기화하시겠습니까?')) return; config={}; saveConfig(); if(currentId) renderSettings(currentId); }

/* config 접근 헬퍼 */
function getCommon(id)   { return (config[id] && config[id].common)   || {}; }
function getPlatCfg(id, plat) { return (config[id] && config[id][plat]) || {}; }
function ensureConfig(id) {
  if (!config[id]) config[id] = {};
  if (!config[id].common)   config[id].common   = {};
  if (!config[id].desktop)  config[id].desktop  = {};
  if (!config[id].mobile)   config[id].mobile   = {};
}
function getCommonVal(id, key)        { var c=getCommon(id);      return c[key]!==undefined ? c[key] : DEFAULT_COMMON[key]; }
function getPlatVal(id, plat, key)    { var c=getPlatCfg(id,plat);return c[key]!==undefined ? c[key] : DEFAULT_PLATFORM[key]; }

/* 실효 눈꺼풀 색 */
function getLidColor(id) {
  var mode   = getCommonVal(id,'colorMode');
  var custom = getCommonVal(id,'customColor');
  if (mode==='white')  return '#ffffff';
  if (mode==='custom') return custom;
  return '#000000';
}

/* ── 씬 목록 ── */
function renderList() {
  var prev=''; var html='';
  SCENES.forEach(function(s) {
    if(s.section!==prev){ html+='<div class="section-head">'+s.section+'</div>'; prev=s.section; }
    var cls='scene-item'+(s.id===currentId?' selected':'')+(s.id===loadedId?' loaded':'');
    html+='<div class="'+cls+'" onclick="selectScene(\''+s.id+'\')"><span>'+s.kr+'</span><span class="code">'+s.code+'</span></div>';
  });
  document.getElementById('sceneList').innerHTML = html;
}

/* ── 설정 패널 ── */
function renderSettings(id) {
  if (!id) return;
  var scene = SCENES.find(function(s){return s.id===id;}); if(!scene) return;

  var cm      = getCommonVal(id,'type');
  var curv    = getCommonVal(id,'curvature');
  var colorMode   = getCommonVal(id,'colorMode');
  var customColor = getCommonVal(id,'customColor');
  var plat = currentPanelPlatform;
  var closeMs   = getPlatVal(id,plat,'closeMs');
  var openMs    = getPlatVal(id,plat,'openMs');
  var holdMs    = getPlatVal(id,plat,'holdMs');
  var closeEase = getPlatVal(id,plat,'closeEase');
  var openEase  = getPlatVal(id,plat,'openEase');
  var gradArea  = getPlatVal(id,plat,'gradArea');
  var gradStr   = getPlatVal(id,plat,'gradStrength');

  /* 타입 */
  var typeHtml = '<div class="type-grid">';
  LID_TYPES.forEach(function(t){
    typeHtml+='<div class="type-opt"><input type="radio" name="lidtype" id="lt_'+t.value+'" value="'+t.value+'"'
      +(t.value===cm?' checked':'')
      +' onchange="onCommonChange(\'type\',this.value);previewLidShape()">'
      +'<label for="lt_'+t.value+'"><span class="type-icon">'+t.icon+'</span>'+t.label+'</label></div>';
  });
  typeHtml += '</div>';

  /* 눈꺼풀 색 */
  var colorHtml = '<div class="color-row">';
  [{v:'black',swatch:'#000',label:'검정'},{v:'white',swatch:'#fff',label:'흰색'},{v:'custom',swatch:customColor,label:'커스텀'}].forEach(function(c){
    colorHtml+='<div class="color-opt"><input type="radio" name="colormode" id="cm_'+c.v+'" value="'+c.v+'"'
      +(c.v===colorMode?' checked':'')
      +' onchange="onColorModeChange(this.value)">'
      +'<label for="cm_'+c.v+'"><span class="color-swatch" style="background:'+c.swatch+'"></span>'+c.label+'</label></div>';
  });
  colorHtml += '</div>'
    +'<div class="color-custom-wrap'+(colorMode==='custom'?' active':'')+'" id="customColorWrap">'
    +'<label>색상</label>'
    +'<input type="color" id="customColorPicker" value="'+customColor+'" oninput="onCustomColorChange(this.value)">'
    +'</div>';

  /* 플랫폼 탭 */
  var tabHtml = '<div class="platform-tabs">'
    +'<div class="ptab'+(plat==='desktop'?' active':'')+'" onclick="switchPanelPlatform(\'desktop\')">🖥 Desktop</div>'
    +'<div class="ptab'+(plat==='mobile'?' active':'')+'" onclick="switchPanelPlatform(\'mobile\')">📱 Mobile</div>'
    +'</div>';

  /* 이징 */
  function easeGroup(key, currentVal) {
    var name = 'ease_'+key+'_'+id;
    var html = '<div class="ease-grid">';
    EASE_TYPES.forEach(function(e){
      html+='<div class="ease-opt"><input type="radio" name="'+name+'" id="'+name+'_'+e.value+'" value="'+e.value+'"'
        +(e.value===currentVal?' checked':'')
        +' onchange="onPlatChange(\''+key+'\',this.value)">'
        +'<label for="'+name+'_'+e.value+'">'+e.label+'</label></div>';
    });
    return html+'</div>';
  }

  document.getElementById('settingsPanel').innerHTML =
    '<h2>'+scene.kr+'</h2><div class="scene-sub">'+scene.code+' · '+scene.id+'</div>'

    /* 공통: 타입 */
    +'<div class="ctrl-group"><div class="ctrl-label">눈꺼풀 타입 (공통)</div>'+typeHtml
    +(cm!=='linear'
      ? '<div class="slider-row" style="margin-top:7px;"><span class="s-label">곡률</span>'
        +'<input type="range" id="curvSlider" min="0" max="100" step="1" value="'+curv+'"'
        +' oninput="onCommonChange(\'curvature\',parseInt(this.value));previewLidShape();document.getElementById(\'curvVal\').textContent=this.value">'
        +'<span class="s-val" id="curvVal">'+curv+'</span></div>'
      : '')
    +'</div>'

    /* 공통: 색 */
    +'<div class="ctrl-group"><div class="ctrl-label">눈꺼풀 색 (공통)</div>'+colorHtml+'</div>'

    /* 플랫폼 탭 */
    +'<div class="ctrl-group"><div class="ctrl-label">플랫폼별 설정</div>'+tabHtml

    /* 속도 */
    +'<div class="slider-row"><span class="s-label">감는 속도</span>'
    +'<input type="range" id="closeSpeed" min="100" max="3000" step="50" value="'+closeMs+'" oninput="onPlatSlider(\'closeMs\',this.value,\'closeVal\')">'
    +'<span class="s-val" id="closeVal">'+closeMs+'ms</span></div>'

    +'<div class="slider-row"><span class="s-label">뜨는 속도</span>'
    +'<input type="range" id="openSpeed" min="100" max="3000" step="50" value="'+openMs+'" oninput="onPlatSlider(\'openMs\',this.value,\'openVal\')">'
    +'<span class="s-val" id="openVal">'+openMs+'ms</span></div>'

    +'<div class="slider-row"><span class="s-label">대기 시간</span>'
    +'<input type="range" id="holdTime" min="0" max="2000" step="50" value="'+holdMs+'" oninput="onPlatSlider(\'holdMs\',this.value,\'holdVal\')">'
    +'<span class="s-val" id="holdVal">'+holdMs+'ms</span></div>'

    /* 이징 */
    +'<div class="ease-section"><div class="ease-section-label">감을 때 이징</div>'+easeGroup('closeEase',closeEase)+'</div>'
    +'<div class="ease-section"><div class="ease-section-label">뜰 때 이징</div>'+easeGroup('openEase',openEase)+'</div>'

    /* 그라디에이션 */
    +'<div class="slider-row"><span class="s-label">그라디에이션 면적</span>'
    +'<input type="range" id="gradArea" min="0" max="50" step="1" value="'+gradArea+'" oninput="onPlatSlider(\'gradArea\',this.value,\'gradAreaVal\')">'
    +'<span class="s-val" id="gradAreaVal">'+gradArea+'%</span></div>'

    +'<div class="slider-row"><span class="s-label">그라디에이션 세기</span>'
    +'<input type="range" id="gradStr" min="0" max="100" step="1" value="'+gradStr+'" oninput="onPlatSlider(\'gradStrength\',this.value,\'gradStrVal\')">'
    +'<span class="s-val" id="gradStrVal">'+gradStr+'%</span></div>'

    +'</div>'/* ctrl-group 닫기 */

    +'<div class="hint"><strong>① 씬 클릭</strong> — 해당 씬 로드<br>'
    +'<strong>② ▶ 버튼</strong> — 다음 씬으로 전환 재생<br>설정은 자동 저장됩니다</div>'
    +'<button class="btn-play" id="playBtn" onclick="playBlink()">▶ 미리보기 (이 씬 → 다음 씬)</button>'
    +'<button class="btn-reload" onclick="loadScene(currentId)">↺ 리로드</button>';
}

/* ── 설정 변경 핸들러 ── */
function onCommonChange(key, val) {
  if (!currentId) return;
  ensureConfig(currentId);
  config[currentId].common[key] = val;
  saveConfig();
  updateLidColor();
}
function onColorModeChange(val) {
  if (!currentId) return;
  ensureConfig(currentId);
  config[currentId].common.colorMode = val;
  saveConfig();
  var wrap = document.getElementById('customColorWrap');
  if (wrap) wrap.classList.toggle('active', val==='custom');
  updateLidColor();
}
function onCustomColorChange(val) {
  if (!currentId) return;
  ensureConfig(currentId);
  config[currentId].common.customColor = val;
  saveConfig();
  updateLidColor();
}
function onPlatSlider(key, val, labelId) {
  if (!currentId) return;
  ensureConfig(currentId);
  var n = parseInt(val);
  config[currentId][currentPanelPlatform][key] = n;
  saveConfig();
  var suffix = (key==='gradArea') ? '%' : (key==='gradStrength') ? '%' : 'ms';
  var el = document.getElementById(labelId);
  if (el) el.textContent = n + suffix;
}
function onPlatChange(key, val) {
  if (!currentId) return;
  ensureConfig(currentId);
  config[currentId][currentPanelPlatform][key] = val;
  saveConfig();
}
function switchPanelPlatform(plat) {
  currentPanelPlatform = plat;
  renderSettings(currentId);
}

/* 미리보기 플랫폼 */
function setPreviewPlatform(plat) {
  currentPlatform = plat;
  document.getElementById('ppDesk').classList.toggle('active', plat==='desktop');
  document.getElementById('ppMob').classList.toggle('active',  plat==='mobile');
  /* 패널 탭도 동기화 */
  currentPanelPlatform = plat;
  renderSettings(currentId);
}

/* ── 씬 선택 + 로드 ── */
function selectScene(id) { currentId=id; renderSettings(id); renderList(); loadScene(id); }

function loadScene(id) {
  if (!id) return;
  var wrap  = document.getElementById('iframeStage');
  var empty = document.getElementById('emptyState');
  var label = document.getElementById('previewLabel');

  var frame = document.getElementById('previewFrame');
  if (!frame) {
    wrap.innerHTML = '';
    frame = document.createElement('iframe');
    frame.id = 'previewFrame'; frame.title = '씬 미리보기';
    frame.style.cssText = 'display:block;width:100%;height:100%;border:none;background:#000;';
    wrap.appendChild(frame);
  }

  wrap.style.display = 'block'; empty.style.display = 'none';
  label.textContent = '로딩 중...';
  iframeReady = false;
  resetLids();

  frame.onload = function() {
    try { frame.contentWindow._MOL_PREVIEW_CONFIG = { desktop:{type:'none',duration:0}, mobile:{type:'none',duration:0} }; } catch(e) {}
    iframeReady = true;
    loadedId = id;
    label.innerHTML = '<span>' + id + '</span>';
    renderList();
  };
  frame.src = '/scenes/' + id + '.html';
}

/* ── 눈꺼풀 스타일 ── */
function applyLidStyle(id, plat) {
  var top  = document.getElementById('lidTop');
  var bot  = document.getElementById('lidBot');
  var type = getCommonVal(id,'type');
  var curv = getCommonVal(id,'curvature'); /* 0~100 */
  var color= getLidColor(id);
  var area = getPlatVal(id,plat,'gradArea');
  var str  = getPlatVal(id,plat,'gradStrength');

  /* 높이 */
  if (type==='asymmetric') { top.style.height='72%'; bot.style.height='28%'; }
  else { top.style.height='50%'; bot.style.height='50%'; }

  /* 모양 */
  top.style.clipPath=''; bot.style.clipPath='';
  top.style.borderRadius='0'; bot.style.borderRadius='0';

  if (type==='convex') {
    /* 볼록: 곡률로 border-radius 조절 */
    var r  = (curv * 0.5).toFixed(1);
    var r2 = (curv * 0.4).toFixed(1);
    top.style.borderRadius = '0 0 '+r+'% '+r+'% / 0 0 '+r2+'% '+r2+'%';
    bot.style.borderRadius = r+'% '+r+'% 0 0 / '+r2+'% '+r2+'% 0 0';
  } else if (type==='concave') {
    /* 오목: clip-path polygon — curv가 클수록 깊게 파임 */
    var d = (curv * 0.32).toFixed(1); /* 최대 ~32% 깊이 */
    var p1 = (100 - d * 0.45).toFixed(1), p2 = (100 - d * 0.65).toFixed(1), p3 = (100 - d).toFixed(1);
    var q1 = (d * 0.45).toFixed(1),       q2 = (d * 0.65).toFixed(1),        q3 = d;
    top.style.clipPath = 'polygon(0 0,100% 0,100% 100%,80% '+p1+'%,60% '+p2+'%,50% '+p3+'%,40% '+p2+'%,20% '+p1+'%,0 100%)';
    bot.style.clipPath = 'polygon(0 0,20% '+q1+'%,40% '+q2+'%,50% '+q3+'%,60% '+q2+'%,80% '+q1+'%,100% 0,100% 100%,0 100%)';
  } else if (type==='asymmetric') {
    /* 비대칭: 위 꺼풀만 곡선, 아래는 완만하게 */
    var rt  = (curv * 0.5).toFixed(1);
    var rt2 = (curv * 0.38).toFixed(1);
    var rb  = (curv * 0.2).toFixed(1);
    var rb2 = (curv * 0.12).toFixed(1);
    top.style.borderRadius = '0 0 '+rt+'% '+rt+'% / 0 0 '+rt2+'% '+rt2+'%';
    bot.style.borderRadius = rb+'% '+rb+'% 0 0 / '+rb2+'% '+rb2+'% 0 0';
  }

  /* 그라디에이션 배경 */
  var alpha = (str/100).toFixed(2);
  var solidStop = 100 - area;

  /* color를 rgba로 변환 */
  var rgb = hexToRgb(color);
  var solid = 'rgba('+rgb+',1)';
  var fade  = 'rgba('+rgb+','+alpha+')';

  if (area > 0) {
    top.style.background = 'linear-gradient(to bottom, '+solid+' 0%, '+solid+' '+solidStop+'%, '+fade+' 100%)';
    bot.style.background = 'linear-gradient(to top,    '+solid+' 0%, '+solid+' '+solidStop+'%, '+fade+' 100%)';
  } else {
    top.style.background = color;
    bot.style.background = color;
  }
}

function hexToRgb(hex) {
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

function previewLidShape() {
  if (!currentId || isPlaying) return;
  var top = document.getElementById('lidTop');
  var bot = document.getElementById('lidBot');
  if (!top || !bot) return;
  applyLidStyle(currentId, currentPlatform);
  /* 잠깐 내렸다가 올리기 */
  top.style.transition = 'transform 280ms ease-out';
  bot.style.transition = 'transform 280ms ease-out';
  top.style.transform = 'translateY(35%)';
  bot.style.transform = 'translateY(-35%)';
  setTimeout(function() {
    top.style.transition = 'transform 380ms ease-in';
    bot.style.transition = 'transform 380ms ease-in';
    top.style.transform = 'translateY(-100%)';
    bot.style.transform = 'translateY(100%)';
  }, 500);
}


function updateLidColor() {
  if (!currentId) return;
  applyLidStyle(currentId, currentPlatform);
}

function resetLids() {
  var top=document.getElementById('lidTop'), bot=document.getElementById('lidBot');
  top.style.transition='none'; bot.style.transition='none';
  top.style.transform='translateY(-100%)'; bot.style.transform='translateY(100%)';
}

/* ── Blink 재생 ── */
function playBlink() {
  if (isPlaying) return;
  if (!loadedId) { alert('먼저 씬을 클릭해서 로드하세요.'); return; }
  if (!iframeReady) { alert('씬이 아직 로딩 중입니다.'); return; }
  var idx=SCENES.findIndex(function(s){return s.id===loadedId;}), next=SCENES[idx+1];
  if (!next) { alert('다음 씬이 없습니다.'); return; }

  isPlaying=true;
  var playBtn=document.getElementById('playBtn'); if(playBtn) playBtn.disabled=true;

  var plat     = currentPlatform;
  var fromId   = loadedId;
  var closeMs  = getPlatVal(fromId,plat,'closeMs');
  var openMs   = getPlatVal(fromId,plat,'openMs');
  var holdMs   = getPlatVal(fromId,plat,'holdMs');
  var closeEase= EASE_CSS[getPlatVal(fromId,plat,'closeEase')] || EASE_CSS['ease-in'];
  var openEase = EASE_CSS[getPlatVal(fromId,plat,'openEase')]  || EASE_CSS['ease-out'];

  var top=document.getElementById('lidTop'), bot=document.getElementById('lidBot');
  var frame=document.getElementById('previewFrame'), label=document.getElementById('previewLabel');
  if (!frame) return;

  resetLids();
  applyLidStyle(fromId, plat);
  label.innerHTML = '<span>' + fromId + '</span>';

  /* 눈 감기 */
  top.style.transition = 'transform '+closeMs+'ms '+closeEase;
  bot.style.transition = 'transform '+closeMs+'ms '+closeEase;
  top.style.transform = 'translateY(0)'; bot.style.transform = 'translateY(0)';

  setTimeout(function() {
    label.innerHTML = '<span>'+SCENES[idx].code+'</span> <span class="arrow">→</span> <span>'+next.code+'</span>';

    /* 눈이 완전히 감힌 상태에서 frame.src로 직접 교체 — goTo() 없이 */
    iframeReady = false;
    frame.onload = function() {
      frame.onload = null;
      iframeReady = true;
      /* 눈 뜨기 */
      top.style.transition = 'transform '+openMs+'ms '+openEase;
      bot.style.transition = 'transform '+openMs+'ms '+openEase;
      top.style.transform = 'translateY(-100%)'; bot.style.transform = 'translateY(100%)';
      setTimeout(function() {
        isPlaying = false; if(playBtn) playBtn.disabled = false;
        label.innerHTML = '<span>'+next.id+'</span> <span style="color:#555;font-size:9px">— 전환 완료</span>';
      }, openMs+50);
    };
    frame.src = '/scenes/'+next.id+'.html';
  }, closeMs+holdMs);
}

/* ── JSON 내보내기 ── */
function openExport() {
  var lines=['// MOL Blink 전환 설정\n'];
  SCENES.forEach(function(s) {
    var c=config[s.id]; if(!c) return;
    var hasChange=false;
    ['common','desktop','mobile'].forEach(function(k){ if(c[k]&&Object.keys(c[k]).length) hasChange=true; });
    if(!hasChange) return;

    lines.push('// '+s.code+' '+s.kr);
    lines.push('blinkTransition: {');
    if(c.common&&Object.keys(c.common).length) lines.push('  common: '+JSON.stringify(c.common)+',');
    ['desktop','mobile'].forEach(function(p){
      if(c[p]&&Object.keys(c[p]).length) lines.push('  '+p+': '+JSON.stringify(c[p])+',');
    });
    lines.push('},\n');
  });
  document.getElementById('exportText').value=lines.length>1?lines.join('\n'):'// 변경된 설정이 없습니다.';
  document.getElementById('exportModal').classList.add('on');
}
function copyExport() {
  document.getElementById('exportText').select(); document.execCommand('copy');
  var btn=document.querySelector('.btn-copy'); btn.textContent='복사됨 ✓';
  setTimeout(function(){btn.textContent='클립보드 복사';},1500);
}
function closeExport() { document.getElementById('exportModal').classList.remove('on'); }
document.getElementById('exportModal').addEventListener('click',function(e){if(e.target===this)closeExport();});

/* 초기화 */
loadConfig(); renderList();

function toggleSceneList() {
  var sceneList     = document.querySelector('.scene-list');
  var settingsPanel = document.getElementById('settingsPanel');
  var btn           = document.querySelector('.btn-menu-toggle');
  var hidden = sceneList.style.display === 'none';
  sceneList.style.display     = hidden ? '' : 'none';
  settingsPanel.style.display = hidden ? '' : 'none';
  btn.textContent = hidden ? '☰ 메뉴' : '✕ 메뉴';
}
</script>
